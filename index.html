<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TRUCO STACK 🃏</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { 
            --gold: #ffeb3b; 
            --blue-btn: linear-gradient(to bottom, #29b6f6, #0288d1); 
            --yellow-btn: linear-gradient(to bottom, #ffee58, #fbc02d); 
            --dark-btn: #222;
        }
        body { margin: 0; background: #000; font-family: 'Arial Black', sans-serif; color: white; overflow: hidden; touch-action: none; text-align: center; }

        /* --- CINEMÁTICA IMPACTO FORTNITE --- */
        #intro-cinematic {
            position: fixed; inset: 0; background: #000; z-index: 9999;
            display: flex; justify-content: center; align-items: center;
        }
        .fn-text {
            font-family: 'Impact', sans-serif; font-size: 5.5rem; color: #fff; 
            text-transform: uppercase; font-style: italic; letter-spacing: -2px;
            text-shadow: -4px -4px 0 #000, 4px -4px 0 #000, -4px 4px 0 #000, 4px 4px 0 #000, 0 0 30px rgba(255,255,255,0.3);
            animation: fortniteDrop 3s cubic-bezier(0.15, 0.85, 0.35, 1) forwards, screenShake 0.4s 0.2s;
        }
        @keyframes fortniteDrop {
            0% { transform: scale(6); opacity: 0; filter: blur(20px); }
            10% { transform: scale(1); opacity: 1; filter: blur(0); }
            85% { opacity: 1; transform: scale(1.05); }
            100% { opacity: 0; transform: scale(0.5); filter: blur(10px); }
        }
        @keyframes screenShake { 0%, 100% { transform: translate(0,0); } 20% { transform: translate(-10px, 10px); } 40% { transform: translate(10px, -10px); } 60% { transform: translate(-10px, -10px); } 80% { transform: translate(10px, 10px); } }

        /* --- MENÚ PRINCIPAL --- */
        .menu-container { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; gap: 15px; padding: 20px; }
        .logo { font-size: 4rem; font-style: italic; color: var(--gold); text-shadow: 0 0 20px rgba(255,235,59,0.5); margin-bottom: 20px; text-transform: uppercase; }
        
        .btn { width: 95%; max-width: 450px; padding: 18px; border-radius: 50px; border: 4px solid #01579b; font-size: 1.4rem; font-weight: bold; cursor: pointer; color: white; text-shadow: 1px 1px 2px #000; transition: 0.2s; text-transform: uppercase; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn-rules { background: var(--dark-btn); border-color: #444; font-size: 1.1rem; }
        .btn-blue { background: var(--blue-btn); }
        .btn-yellow { background: var(--yellow-btn); color: #3e2723; border-color: #fbc02d; }
        
        input { width: 85%; max-width: 400px; padding: 18px; border-radius: 15px; border: none; font-size: 1.3rem; text-align: center; margin: 10px 0; outline: none; background: #fff; color: #000; }

        /* --- UI JUEGO --- */
        #game-ui { display: none; height: 100vh; flex-direction: column; background: radial-gradient(circle, #1b5e20, #0a3d1d); }
        .action-bar { display: flex; justify-content: center; gap: 10px; padding: 15px; background: rgba(0,0,0,0.6); }
        .btn-action { padding: 12px 20px; border-radius: 10px; border: none; font-weight: bold; background: var(--gold); color: #000; text-transform: uppercase; cursor: pointer; }
        
        #my-hand { height: 180px; display: flex; justify-content: center; margin-top: auto; margin-bottom: 40px; position: relative; }
        .card-container { position: absolute; display: flex; flex-direction: column; align-items: center; }
        .emoji-float { font-size: 2.2rem; margin-bottom: -10px; z-index: 10; filter: drop-shadow(0 0 5px #000); }
        .card-obj { width: 85px; height: 125px; background: white; border-radius: 12px; color: black; padding: 10px; box-sizing: border-box; border: 2px solid #999; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
    </style>
</head>
<body>

    <div id="intro-cinematic"><div class="fn-text">TRUCO STACK</div></div>

    <div id="main-menu" class="menu-container">
        <h1 class="logo">TRUCO STACK</h1>
        
        <button class="btn btn-rules" onclick="alert('Reglas: Jerarquía de Truco + Poderes Uno (10: Turno extra, 11: Salto, 12: Cambio de sentido).')">📖 REGLAS DEL JUEGO</button>
        
        <button class="btn btn-blue" onclick="startJuego('SOLO')">🕹️ MODO SOLITARIO</button>
        
        <hr style="width:90%; opacity:0.2; margin: 10px 0;">
        
        <select id="game-mode" style="width: 90%; max-width: 420px; padding: 10px; border-radius: 10px; background: #333; color: white; border: 1px solid var(--gold); margin-bottom: 5px;">
            <option value="FFA">TODOS CONTRA TODOS (FFA)</option>
            <option value="2V2">EQUIPOS 2 VS 2</option>
        </select>

        <button class="btn btn-yellow" onclick="crearServidor()">🏠 CREAR MESA ONLINE</button>
        
        <input type="text" id="join-code" placeholder="ID de la Mesa">
        <button class="btn btn-yellow" onclick="conectarServidor()">🤝 UNIRSE A MESA</button>
        
        <p id="status-msg" style="margin-top:10px; color: var(--gold); font-size: 1.2rem;"></p>
    </div>

    <div id="game-ui">
        <div class="action-bar">
            <button class="btn-action" onclick="gritar('¡ENVIDO!')">🍀 ENVIDO</button>
            <button class="btn-action" onclick="gritar('¡TRUCO!')">⚔️ TRUCO</button>
        </div>
        <h2 id="shout-display" style="font-size: 3rem; margin-top: 50px; text-shadow: 2px 2px #000; text-transform: uppercase;"></h2>
        <div id="my-hand"></div>
    </div>

    <script>
        let peer, conn;
        
        function crearServidor() {
            const mode = document.getElementById('game-mode').value;
            const code = Math.random().toString(36).substring(2, 6).toUpperCase();
            peer = new Peer(code);
            peer.on('open', (id) => {
                document.getElementById('status-msg').innerText = `MODO ${mode} - CÓDIGO: ${id}`;
                alert(`Mesa ${mode} creada. Código: ${id}`);
            });
            peer.on('connection', (c) => {
                conn = c;
                conn.on('data', (data) => { if(data === 'START') startJuego(mode); });
                alert("¡Un jugador se ha unido!");
            });
        }

        function conectarServidor() {
            const code = document.getElementById('join-code').value.toUpperCase();
            if(!code) return alert("Ingresa el ID de la mesa");
            peer = new Peer();
            peer.on('open', () => {
                const connection = peer.connect(code);
                connection.on('open', () => {
                    document.getElementById('status-msg').innerText = "CONECTANDO...";
                    connection.send('START');
                    startJuego('ONLINE');
                });
            });
        }

        function startJuego(tipo) {
            document.getElementById('main-menu').style.display = 'none';
            document.getElementById('game-ui').style.display = 'flex';
            renderMano();
        }

        function gritar(texto) {
            const h2 = document.getElementById('shout-display');
            h2.innerText = texto;
            setTimeout(() => h2.innerText = "", 2000);
        }

        function renderMano() {
            const handDiv = document.getElementById('my-hand');
            const hand = [{v: 1, s: '⚔️', e: '🔥'}, {v: 10, s: '🏆', e: '🎺'}, {v: 7, s: '🟡', e: '😭'}];
            hand.forEach((c, i) => {
                const container = document.createElement('div');
                container.className = 'card-container';
                container.style.left = `calc(50% - 42px + ${(i - 1) * 95}px)`;
                container.innerHTML = `<div class="emoji-float">${c.e}</div><div class="card-obj"><b>${c.v}</b><br><br>${c.s}</div>`;
                handDiv.appendChild(container);
            });
        }

        window.onload = () => {
            setTimeout(() => {
                const intro = document.getElementById('intro-cinematic');
                intro.style.transition = "opacity 0.8s";
                intro.style.opacity = "0";
                setTimeout(() => intro.remove(), 800);
            }, 3000);
        };
    </script>
</body>
</html>
