<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TRUCO-UNO: Stack & Win</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icono.jpg">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="start-screen" class="overlay active">
        <div class="menu-content">
            <img src="icono.jpg" alt="Icono" class="menu-icon">
            <h1 class="logo">STACK <span class="uno-color">& WIN</span></h1>
            <button onclick="startGame()" class="btn-play">¡REPARTIR!</button>
            <div class="menu-footer">
                <button onclick="alert('Reglas: Coincide palo o número. Los 1 valen doble. El 1 de espada limpia la mesa.')">REGLAS</button>
            </div>
        </div>
    </div>

    <div id="game-container">
        <div class="header">
            <div class="score-badge">🏆 <span id="score">0</span></div>
            <div class="deck-badge">🎴 <span id="deck-count">40</span></div>
        </div>

        <div class="table">
            <div id="deck" class="card deck" onclick="drawCard()">
                <div class="card-inner back"></div>
            </div>
            <div id="discard-pile" class="card-slot"></div>
        </div>

        <div id="announcement"></div>

        <div class="hand-area">
            <div id="player-hand" class="hand"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
