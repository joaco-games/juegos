<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TRUCO-STACK DEFINITIVO</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --gold: #ffd700; --green: radial-gradient(circle, #1b5e20, #0a3d1d); --red: #d32f2f; }
        body { margin: 0; background: #000; font-family: 'Arial Black', sans-serif; color: white; overflow: hidden; touch-action: none; }

        /* CINEMÁTICA INICIAL */
        #intro-cinematic { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; justify-content: center; align-items: center; }
        .fn-text { font-family: 'Impact', sans-serif; font-size: 5rem; color: #fff; font-style: italic; text-shadow: 0 0 20px rgba(255,215,0,0.5); animation: fIn 3s ease forwards; opacity: 0; }
        @keyframes fIn { 0% { transform: scale(2); opacity: 0; } 15% { transform: scale(1); opacity: 1; } 85% { opacity: 1; } 100% { transform: scale(0.8); opacity: 0; } }

        /* INTERFAZ DE LOBBY */
        .overlay { position: fixed; inset: 0; background: var(--green); z-index: 1000; display: flex; justify-content: center; align-items: center; text-align: center; }
        .overlay:not(.active) { display: none; }
        .menu-card { background: rgba(0,0,0,0.9); padding: 25px; border-radius: 30px; border: 3px solid var(--gold); width: 85%; max-width: 400px; backdrop-filter: blur(15px); box-shadow: 0 0 30px rgba(0,0,0,0.5); }
        
        .btn { background: linear-gradient(to bottom, #ffeb3b, #fbc02d); border: none; padding: 15px; font-size: 1rem; font-weight: bold; border-radius: 50px; color: #3e2723; width: 100%; margin: 8px 0; cursor: pointer; box-shadow: 0 4px 0 #bda06d; transition: 0.1s; }
        .btn:active { transform: translateY(3px); box-shadow: 0 1px 0 #bda06d; }
        .btn-blue { background: linear-gradient(to bottom, #4fc3f7, #0288d1); color: white; box-shadow: 0 4px 0 #01579b; }

        /* JUEGO */
        #game-ui { height: 100vh; display: none; flex-direction: column; background: var(--green); }
        .header { display: flex; justify-content: space-between; padding: 50px 15px 10px; z-index: 10; }
        .score-box { background: rgba(0,0,0,0.8); padding: 8px 15px; border-radius: 15px; border: 1px solid var(--gold); font-size: 0.8rem; }

        .table { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; position: relative; }
        .hand-area { height: 160px; width: 100%; position: relative; margin-bottom: 30px; }
        .hand { display: flex; justify-content: center; width: 100%; height: 100%; position: relative; }

        .card-obj { 
            width: 85px; height: 125px; background: white; border-radius: 12px; color: black; 
            display: flex; flex-direction: column; justify-content: space-between; padding: 10px; 
            box-sizing: border-box; box-shadow: 0 5px 15px rgba(0,0,0,0.4); 
            position: absolute; transition: all 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.28); border: 1px solid #ccc;
            user-select: none;
        }

        /* CHAT DE PICA */
        .chat-pica { position: fixed; right: 10px; top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; gap: 10px; z-index: 2000; }
        .chat-btn { background: rgba(0,0,0,0.7); border: 1px solid var(--gold); color: white; border-radius: 50%; width: 45px; height: 45px; font-size: 0.7rem; cursor: pointer; display: flex; align-items: center; justify-content: center; text-align: center; }

        #msg-pop { position: fixed; top: 25%; width: 100%; text-align: center; font-size: 2.2rem; color: var(--gold); pointer-events: none; opacity: 0; z-index: 3000; font-family: 'Impact'; text-shadow: 2px 2px 0 #000; }
        .anim-msg { animation: pop 1.5s forwards; }
        @keyframes pop { 0% { opacity:0; transform:scale(0.5); } 30% { opacity:1; transform:scale(1.1); } 100% { opacity:0; transform:translateY(-60px); } }
    </style>
</head>
<body>

    <div id="intro-cinematic"><div class="fn-text">TRUCO STACK</div></div>
    <div id="msg-pop"></div>

    <div id="lobby" class="overlay active">
        <div class="menu-card">
            <h1 style="color:var(--gold); font-style:italic;">TRUCO STACK</h1>
            <button class="btn btn-blue" onpointerdown="startMode('solo')">MODO SOLITARIO</button>
            <hr style="opacity:0.2; margin:15px 0;">
            <button class="btn" onpointerdown="initOnline(true)">CREAR MESA ONLINE</button>
            <input type="text" id="join-id" placeholder="ID de la Mesa" style="width:85%; padding:12px; border-radius:10px; margin:10px 0; text-align:center; border:none; font-weight:bold;">
            <button class="btn" onpointerdown="initOnline(false)">UNIRSE A MESA</button>
            <div id="waiting" style="display:none; margin-top:15px;">
                <p>CÓDIGO: <b id="display-id" style="color:var(--gold); font-size:1.5rem;">...</b></p>
                <button class="btn" id="start-btn" style="display:none; background:var(--red); color:white;" onpointerdown="hostGameStart()">¡EMPEZAR PARTIDA!</button>
            </div>
        </div>
    </div>

    <div id="game-ui">
        <div class="chat-pica">
            <div class="chat-btn" onpointerdown="sendEmoji('📢 ¡TRUCO!')">🧤</div>
            <div class="chat-btn" onpointerdown="sendEmoji('📢 ¡QUIERO!')">👍</div>
            <div class="chat-btn" onpointerdown="sendEmoji('📢 ¡NO QUIERO!')">👎</div>
            <div class="chat-btn" onpointerdown="sendEmoji('📢 ¡MAZO!')">🏳️</div>
        </div>

        <div class="header">
            <div class="score-box" id="score-display">TÚ: 0 | RIVAL: 0</div>
            <div class="score-box" id="turn-label">Esperando...</div>
        </div>

        <div class="table">
            <div style="display:flex; gap:30px; align-items:center;">
                <div class="card-obj" style="position:static; background:#333; border:3px dashed #555; color:white; display:flex; align-items:center; justify-content:center;" onpointerdown="playerDraw()">MAZO</div>
                <div id="discard-pile"></div>
            </div>
        </div>

        <div class="hand-area">
            <div id="player-hand" class="hand"></div>
        </div>
    </div>

    <script>
        let peer, conn, isHost = false, isSolo = false;
        let myIdx = 0, score = [0, 0];
        let state = { deck: [], discard: null, hands: [[], []], turn: 0 };
        const suits = [{n:'Espadas',s:'⚔️',c:'#1976d2'},{n:'Bastos',s:'🪵',c:'#388e3c'},{n:'Oros',s:'🟡',c:'#fbc02d'},{n:'Copas',s:'🏆',c:'#d32f2f'}];
        const values = [1,2,3,4,5,6,7,10,11,12];

        // --- CINEMÁTICA ---
        setTimeout(() => document.getElementById('intro-cinematic')?.remove(), 3200);

        // --- CONEXIÓN ---
        function initOnline(host) {
            isHost = host; isSolo = false;
            const id = host ? 'MESA-' + Math.floor(100 + Math.random()*899) : document.getElementById('join-id').value.toUpperCase();
            if(!id) return alert("Ingresa un ID");

            peer = new Peer(host ? id : undefined);
            peer.on('open', (idOpen) => {
                document.getElementById('waiting').style.display = 'block';
                document.getElementById('display-id').innerText = host ? idOpen : id;
                if(!host) { conn = peer.connect(id); setupEvents(); }
            });
            peer.on('connection', (c) => { conn = c; setupEvents(); document.getElementById('start-btn').style.display = 'block'; });
        }

        function setupEvents() {
            conn.on('data', (d) => {
                if(d.type === 'SYNC') { state = d.state; score = d.score; myIdx = isHost ? 0 : 1; uiStart(); }
                if(d.type === 'CHAT') notify(d.msg);
            });
        }

        function startMode(m) { if(m==='solo') { isSolo = true; myIdx = 0; hostGameStart(); } }
        function uiStart() { document.getElementById('lobby').classList.remove('active'); document.getElementById('game-ui').style.display = 'flex'; render(); }

        function hostGameStart() {
            state.deck = [];
            suits.forEach(s => values.forEach(v => state.deck.push({suit:s, value:v})));
            state.deck.sort(() => Math.random() - 0.5);
            state.hands = [[], []];
            for(let i=0; i<4; i++) { state.hands[0].push(state.deck.pop()); state.hands[1].push(state.deck.pop()); }
            state.discard = state.deck.pop();
            state.turn = 0;
            if(!isSolo) sync();
            uiStart();
        }

        // --- LÓGICA DE JUEGO ---
        function playCard(i) {
            if(state.turn !== myIdx) return;
            const card = state.hands[myIdx][i];
            if(card.suit.n === state.discard.suit.n || card.value === state.discard.value) {
                applyPower(card);
                state.discard = card;
                state.hands[myIdx].splice(i, 1);
                
                if(state.hands[myIdx].length === 0) {
                    score[myIdx]++; notify("¡GANASTE LA RONDA!", true);
                    setTimeout(hostGameStart, 2000);
                } else {
                    if(card.value !== 10) state.turn = isSolo ? (state.turn === 0 ? 1 : 0) : (myIdx === 0 ? 1 : 0);
                    else notify("¡TURNO EXTRA!", true);
                }
                sync();
            }
        }

        function applyPower(c) {
            const rival = myIdx === 0 ? 1 : 0;
            // 7 de Oro o Espada: Rival roba 2
            if(c.value === 7 && (c.suit.n === 'Oros' || c.suit.n === 'Espadas')) {
                for(let k=0; k<2; k++) if(state.deck.length) state.hands[rival].push(state.deck.pop());
                notify("+2 AL RIVAL", true);
            }
            // Rey (12): Salta turno
            if(c.value === 12) { notify("¡SALTO!", true); state.turn = myIdx; }
        }

        function playerDraw() {
            if(state.turn !== myIdx) return;
            if(state.deck.length) {
                state.hands[myIdx].push(state.deck.pop());
                state.turn = isSolo ? 1 : (myIdx === 0 ? 1 : 0);
                sync();
            }
        }

        function sync() {
            if(isSolo) { render(); if(state.turn === 1) setTimeout(iaLogic, 1200); return; }
            conn.send({ type: 'SYNC', state, score });
            render();
        }

        function sendEmoji(txt) { 
            notify(txt); 
            if(conn) conn.send({ type: 'CHAT', msg: txt }); 
        }

        function notify(t, broadcast=false) {
            const m = document.getElementById('msg-pop');
            m.innerText = t; m.classList.remove('anim-msg');
            void m.offsetWidth; m.classList.add('anim-msg');
            if(broadcast && conn) conn.send({ type: 'CHAT', msg: t });
        }

        // --- RENDERIZADO Y MANO ADAPTATIVA ---
        function render() {
            document.getElementById('score-display').innerText = `TÚ: ${score[myIdx]} | RIVAL: ${score[myIdx===0?1:0]}`;
            document.getElementById('turn-label').innerText = state.turn === myIdx ? "TU TURNO" : "ESPERANDO...";
            document.getElementById('discard-pile').innerHTML = createCardHTML(state.discard);
            
            const handDiv = document.getElementById('player-hand');
            handDiv.innerHTML = '';
            const myHand = state.hands[myIdx];
            
            // Fix para que no se salgan de la pantalla (Usuario 024)
            const screenW = window.innerWidth * 0.9;
            const overlap = Math.min(75, screenW / myHand.length);

            myHand.forEach((card, i) => {
                const el = document.createElement('div');
                el.className = 'card-obj';
                el.style.color = card.suit.c;
                el.style.left = `calc(50% - 42px + ${(i - (myHand.length-1)/2) * overlap}px)`;
                el.style.zIndex = i;
                el.innerHTML = `<b>${card.value}</b><div style="font-size:2rem;text-align:center">${card.suit.s}</div><b style="align-self:flex-end;transform:rotate(180deg)">${card.value}</b>`;
                el.onpointerdown = (e) => { e.preventDefault(); playCard(i); };
                handDiv.appendChild(el);
            });
        }

        function iaLogic() {
            let h = state.hands[1];
            let idx = h.findIndex(c => c.suit.n === state.discard.suit.n || c.value === state.discard.value);
            if(idx !== -1) {
                const c = h[idx];
                if(c.value === 12) state.turn = 1; else if(c.value !== 10) state.turn = 0;
                state.discard = h.splice(idx, 1)[0];
                if(h.length === 0) { score[1]++; notify("IA GANA"); setTimeout(hostGameStart, 1500); }
            } else {
                if(state.deck.length) h.push(state.deck.pop());
                state.turn = 0;
            }
            render();
        }

        function createCardHTML(c) {
            return `<div class="card-obj" style="position:static; color:${c.suit.c}"><b>${c.value}</b><div style="font-size:2rem;text-align:center">${c.suit.s}</div><b style="align-self:flex-end;transform:rotate(180deg)">${c.value}</b></div>`;
        }
    </script>
</body>
</html>
