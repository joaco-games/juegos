<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TRUCO-STACK 4P</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="https://github.com/joaco-games/juegos/blob/main/icono..png?raw=true">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        :root {
            --gold: #ffd700;
            --green-bg: radial-gradient(circle, #1b5e20, #0a3d1d);
            --red-uno: #ff1744;
            --parchment: #f4e4bc;
        }

        body {
            margin: 0; padding: 0; background: #000;
            font-family: 'Arial Rounded MT Bold', sans-serif;
            color: white; overflow: hidden; touch-action: manipulation;
        }

        /* Pantalla Inicial */
        .overlay {
            position: fixed; inset: 0; background: var(--green-bg);
            z-index: 1000; display: flex; justify-content: center; align-items: center;
            transition: 0.6s ease;
        }
        .overlay:not(.active) { opacity: 0; visibility: hidden; pointer-events: none; }

        .menu-content { 
            text-align: center; width: 85%; max-width: 450px; 
            background: rgba(0,0,0,0.5); padding: 25px; border-radius: 30px;
            border: 2px solid var(--gold); backdrop-filter: blur(10px);
        }

        .info-box {
            background: var(--parchment); color: #3e2723;
            padding: 15px; border-radius: 15px; margin: 15px 0;
            font-size: 0.85rem; text-align: left; max-height: 150px; overflow-y: auto;
        }

        .btn-play {
            background: linear-gradient(to bottom, #ffeb3b, #fbc02d);
            border: none; padding: 15px 40px; font-size: 1.3rem; font-weight: bold;
            border-radius: 50px; color: #3e2723; box-shadow: 0 5px 0 #bda06d; cursor: pointer;
        }

        /* Mesa de Juego */
        #game-container { 
            height: 100vh; background: var(--green-bg); 
            display: grid; grid-template-areas: ". top ." "left center right" ". bottom .";
            grid-template-rows: 120px 1fr 180px; grid-template-columns: 80px 1fr 80px;
            visibility: hidden;
        }
        #game-container.active { visibility: visible; }

        .player-area { display: flex; justify-content: center; align-items: center; position: relative; }
        .area-top { grid-area: top; }
        .area-bottom { grid-area: bottom; }
        .area-left { grid-area: left; flex-direction: column; }
        .area-right { grid-area: right; flex-direction: column; }

        .center-board { grid-area: center; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 15px; }

        /* Cartas */
        .card-obj {
            width: 70px; height: 105px; background: white; border-radius: 8px;
            color: black; display: flex; flex-direction: column; justify-content: space-between;
            padding: 8px; box-sizing: border-box; box-shadow: 0 4px 10px rgba(0,0,0,0.4);
            font-size: 0.9rem; position: relative; transition: 0.3s;
        }

        .card-back { background: #3e2723; border: 2px solid var(--gold); }

        .hand-horizontal { display: flex; gap: -30px; justify-content: center; width: 100%; height: 120px; position: relative; }
        .hand-vertical { display: flex; flex-direction: column; gap: -60px; }

        .card-player { cursor: pointer; margin-left: -35px; }
        .card-player:active { transform: translateY(-30px) scale(1.2) !important; z-index: 100; }

        .active-turn { box-shadow: 0 0 20px var(--gold); border-radius: 50%; padding: 5px; }

        .stat-bar { position: absolute; top: 50px; left: 20px; font-size: 0.8rem; background: rgba(0,0,0,0.5); padding: 5px 15px; border-radius: 20px; border: 1px solid var(--gold); }

        #announcement {
            position: fixed; top: 45%; width: 100%; text-align: center;
            font-size: 1.8rem; color: var(--gold); text-shadow: 0 0 10px #000;
            pointer-events: none; opacity: 0; z-index: 2000; font-weight: bold;
        }
        .show-msg { animation: msgPop 1s forwards; }
        @keyframes msgPop { 0% { opacity: 0; transform: scale(0.5); } 50% { opacity: 1; } 100% { opacity: 0; transform: translateY(-30px); } }
    </style>
</head>
<body>

    <div id="start-screen" class="overlay active">
        <div class="menu-content">
            <img src="https://github.com/joaco-games/juegos/blob/main/icono..png?raw=true" alt="Icono" style="width:80px; border-radius:20px;">
            <h1 class="logo">TRUCO<span class="uno-color">-STACK</span> 4P</h1>
            <p style="font-size:0.8rem; font-style:italic;">Joaco Games & AI - Modo Multijugador IA</p>
            <div class="info-box">
                <strong>REGLAS DE MESA:</strong><br>
                • 4 Jugadores. Gana quien vacíe su mano.<br>
                • Tira por Palo o Número (UNO).<br>
                • 1, 2 y 3 dan Puntos de Truco extra.<br>
                • Si no puedes jugar, robas automáticamente.
            </div>
            <button onclick="startGame()" class="btn-play">MESA COMPLETA</button>
        </div>
    </div>

    <div id="game-container">
        <div class="stat-bar">Puntos: <span id="score">0</span> | Turno: <span id="turn-name">Tuyo</span></div>
        
        <div class="player-area area-top"><div id="hand-2" class="hand-horizontal"></div></div>
        <div class="player-area area-left"><div id="hand-3" class="hand-vertical"></div></div>
        <div class="player-area area-right"><div id="hand-1" class="hand-vertical"></div></div>
        
        <div class="center-board">
            <div id="deck" class="card-obj card-back" onclick="playerDraw()" style="cursor:pointer"></div>
            <div id="discard-pile"></div>
        </div>

        <div class="player-area area-bottom">
            <div id="hand-0" class="hand-horizontal"></div>
        </div>

        <div id="announcement"></div>
    </div>

    <script>
        const suits = [
            {n: 'Espadas', s: '⚔️', c: '#1976d2'},
            {n: 'Bastos', s: '🪵', c: '#388e3c'},
            {n: 'Oros', s: '🟡', c: '#fbc02d'},
            {n: 'Copas', s: '🏆', c: '#d32f2f'}
        ];
        const values = [1, 2, 3, 4, 5, 6, 7, 10, 11, 12];
        let deck = [], players = [[], [], [], []], discardCard = null, turn = 0, score = 0;
        const playerNames = ["Tuyo", "IA Derecha", "IA Arriba", "IA Izquierda"];

        function startGame() {
            document.getElementById('start-screen').classList.remove('active');
            document.getElementById('game-container').classList.add('active');
            initGame();
        }

        function initGame() {
            deck = [];
            suits.forEach(s => values.forEach(v => deck.push({ suit: s, value: v })));
            deck.sort(() => Math.random() - 0.5);
            
            players = [[], [], [], []];
            for(let i=0; i<4; i++) {
                for(let j=0; j<5; j++) players[i].push(deck.pop());
            }
            discardCard = deck.pop();
            render();
        }

        function render() {
            document.getElementById('discard-pile').innerHTML = createCardHTML(discardCard);
            document.getElementById('score').innerText = score;
            document.getElementById('turn-name').innerText = playerNames[turn];

            for(let i=0; i<4; i++) {
                const handDiv = document.getElementById(`hand-${i}`);
                handDiv.innerHTML = '';
                players[i].forEach((card, idx) => {
                    const el = document.createElement('div');
                    if(i === 0) { // Jugador Humano
                        el.innerHTML = createCardHTML(card);
                        el.firstChild.classList.add('card-player');
                        el.firstChild.onclick = () => playCard(idx);
                    } else { // Computadoras (Carta tapada)
                        el.innerHTML = `<div class="card-obj card-back" style="${i%2!==0?'margin-top:-80px':'margin-left:-40px'}"></div>`;
                    }
                    handDiv.appendChild(el.firstChild);
                });
            }
        }

        function createCardHTML(card) {
            return `<div class="card-obj">
                <b style="color:${card.suit.c}">${card.value}</b>
                <div style="font-size:1.8rem; text-align:center">${card.suit.s}</div>
                <b style="align-self:flex-end; transform:rotate(180deg); color:${card.suit.c}">${card.value}</b>
            </div>`;
        }

        function playCard(idx) {
            if(turn !== 0) return;
            const card = players[0][idx];
            if(card.suit.n === discardCard.suit.n || card.value === discardCard.value) {
                executeMove(0, idx);
            } else {
                notify("¡No podés tirar esa!");
            }
        }

        function playerDraw() {
            if(turn !== 0) return;
            players[0].push(deck.pop());
            nextTurn();
        }

        function executeMove(pIdx, cIdx) {
            const card = players[pIdx][cIdx];
            discardCard = card;
            players[pIdx].splice(cIdx, 1);
            if(pIdx === 0) score += 10;
            
            if(players[pIdx].length === 0) {
                notify("¡GANÓ " + playerNames[pIdx] + "!");
                setTimeout(initGame, 3000);
                return;
            }
            nextTurn();
        }

        function nextTurn() {
            turn = (turn + 1) % 4;
            render();
            if(turn !== 0) setTimeout(iaPlay, 1000);
        }

        function iaPlay() {
            const hand = players[turn];
            const possibleMoves = hand.map((c, i) => 
                (c.suit.n === discardCard.suit.n || c.value === discardCard.value) ? i : -1
            ).filter(i => i !== -1);

            if(possibleMoves.length > 0) {
                // La IA elige la mejor carta (1, 2 o 3 si puede)
                const bestMove = possibleMoves.sort((a, b) => hand[b].value - hand[a].value)[0];
                executeMove(turn, bestMove);
            } else {
                if(deck.length > 0) players[turn].push(deck.pop());
                nextTurn();
            }
        }

        function notify(txt) {
            const el = document.getElementById('announcement');
            el.innerText = txt; el.classList.add('show-msg');
            setTimeout(() => el.classList.remove('show-msg'), 1000);
        }

        function notify(txt) {
            const el = document.getElementById('announcement');
            el.innerText = txt; el.className = 'show-msg';
            setTimeout(() => el.className = '', 1000);
        }
    </script>
</body>
</html>
