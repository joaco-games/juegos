<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TRUCO STACK 🃏</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { 
            --gold: #ffeb3b; 
            --blue-btn: linear-gradient(to bottom, #29b6f6, #0288d1); 
            --yellow-btn: linear-gradient(to bottom, #ffee58, #fbc02d); 
            --team-btn: linear-gradient(to bottom, #66bb6a, #388e3c);
        }
        body { margin: 0; background: #000; font-family: 'Arial Black', sans-serif; color: white; overflow: hidden; touch-action: none; text-align: center; }

        /* --- MENÚ PRINCIPAL --- */
        .menu-container { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; gap: 10px; padding: 20px; overflow-y: auto; }
        .logo { font-size: 3.2rem; font-style: italic; color: var(--gold); text-transform: uppercase; margin-bottom: 5px; }
        
        .btn { width: 95%; max-width: 450px; padding: 18px; border-radius: 50px; border: 4px solid #01579b; font-size: 1.2rem; font-weight: bold; cursor: pointer; color: white; text-shadow: 1px 1px 2px #000; text-transform: uppercase; transition: 0.2s; }
        .btn-rules { background: #333; border-color: #111; font-size: 1rem; padding: 10px; }
        .btn-blue { background: var(--blue-btn); }
        .btn-yellow { background: var(--yellow-btn); color: #3e2723; border-color: #f57f17; }

        input { width: 85%; max-width: 400px; padding: 15px; border-radius: 12px; border: none; font-size: 1.1rem; text-align: center; margin: 5px 0; }
        
        /* --- UI JUEGO --- */
        #game-ui { display: none; height: 100vh; flex-direction: column; background: radial-gradient(circle, #1b5e20, #0a3d1d); }
        .action-bar { display: flex; flex-wrap: wrap; justify-content: center; gap: 5px; padding: 10px; background: rgba(0,0,0,0.8); border-bottom: 2px solid var(--gold); }
        .btn-action { padding: 10px; border-radius: 8px; border: none; font-weight: bold; background: var(--gold); color: #000; font-size: 0.8rem; text-transform: uppercase; }
        .btn-team { background: var(--team-btn); color: white; }

        /* --- CHAT TÁCTICO --- */
        #chat-display { position: absolute; top: 120px; left: 10px; right: 10px; height: 120px; overflow: hidden; display: none; flex-direction: column; gap: 5px; pointer-events: none; }
        .msg { font-size: 0.9rem; padding: 5px 10px; border-radius: 5px; text-align: left; width: fit-content; max-width: 80%; }
        .msg-global { background: rgba(255,255,255,0.2); color: white; }
        .msg-team { background: rgba(76, 175, 80, 0.4); color: #afffaf; border-left: 4px solid #4CAF50; font-weight: bold; }

        #shout-box { position: absolute; top: 45%; width: 100%; font-size: 3.5rem; color: #fff; text-shadow: 0 0 20px #000; font-style: italic; pointer-events: none; }
        #my-hand { height: 180px; display: flex; justify-content: center; margin-top: auto; margin-bottom: 30px; position: relative; }
        .card-obj { width: 85px; height: 125px; background: white; border-radius: 12px; color: black; padding: 10px; border: 2px solid #999; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
    </style>
</head>
<body>

    <div id="main-menu" class="menu-container">
        <h1 class="logo">TRUCO STACK</h1>
        <button class="btn btn-rules" onclick="alert('Reglas Mixtas Activas.')">📖 REGLAS</button>
        <button class="btn btn-blue" onclick="startJuego('SOLO')">🕹️ MODO SOLITARIO</button>
        
        <hr style="width:90%; opacity:0.3;">
        <p style="margin:0; font-size:0.8rem;">🏠 MISMO LUGAR (SIN CHAT)</p>
        <button class="btn btn-yellow" onclick="iniciarMesa('LOCAL')">CREAR MESA LOCAL</button>
        
        <hr style="width:90%; opacity:0.3;">
        <p style="margin:0; font-size:0.8rem;">🌍 DISTINTAS CASAS (CON CHAT TÁCTICO)</p>
        <button class="btn btn-yellow" onclick="iniciarMesa('2V2')">CREAR 2 VS 2 ONLINE</button>
        <button class="btn btn-yellow" onclick="iniciarMesa('FFA')">CREAR TODOS VS TODOS</button>
        
        <input type="text" id="room-input" placeholder="CÓDIGO DE MESA">
        <button class="btn btn-yellow" onclick="unirse()">🤝 UNIRSE A MESA</button>
        <p id="status" style="color:var(--gold); font-size:0.9rem;"></p>
    </div>

    <div id="game-ui">
        <div class="action-bar" id="game-actions">
            <button class="btn-action" onclick="gritar('¡TRUCO!')">⚔️ TRUCO</button>
            <button class="btn-action" onclick="gritar('¡ENVIDO!')">🍀 ENVIDO</button>
            <button class="btn-action btn-team" id="btn-secret" onclick="susurrar()">🤫 SUSURRAR COMPAÑERO</button>
        </div>
        
        <div id="chat-display"></div>
        <div id="shout-box"></div>
        <div id="my-hand"></div>
    </div>

    <script>
        let peer, conn, tipoJuego;

        function iniciarMesa(tipo) {
            tipoJuego = tipo;
            const code = tipo + "-" + Math.random().toString(36).substring(2, 5).toUpperCase();
            peer = new Peer(code);
            peer.on('open', (id) => {
                document.getElementById('status').innerText = "ID: " + id;
                alert("Mesa " + tipo + " creada. Código: " + id);
            });
            setupConexion();
        }

        function unirse() {
            const code = document.getElementById('room-input').value.toUpperCase();
            tipoJuego = code.includes('2V2') ? '2V2' : (code.includes('FFA') ? 'FFA' : 'LOCAL');
            peer = new Peer();
            peer.on('open', () => {
                conn = peer.connect(code);
                conn.on('open', () => {
                    conn.send({type: 'JOIN'});
                    startJuego();
                });
            });
        }

        function setupConexion() {
            peer.on('connection', (c) => {
                conn = c;
                conn.on('data', (data) => {
                    if(data.type === 'JOIN') startJuego();
                    if(data.type === 'SHOUT') animarGrito(data.txt);
                    if(data.type === 'SECRET') mostrarMensaje(data.txt, true);
                });
            });
        }

        function startJuego() {
            document.getElementById('main-menu').style.display = 'none';
            document.getElementById('game-ui').style.display = 'flex';
            if(tipoJuego === '2V2' || tipoJuego === 'FFA') {
                document.getElementById('chat-display').style.display = 'flex';
            }
            if(tipoJuego !== '2V2') {
                document.getElementById('btn-secret').style.display = 'none';
            }
            renderMano();
        }

        function gritar(txt) {
            animarGrito(txt);
            if(conn) conn.send({type: 'SHOUT', txt: txt});
        }

        function susurrar() {
            const msg = prompt("Mensaje secreto para tu compañero:");
            if(msg) {
                mostrarMensaje("Secreto: " + msg, true);
                if(conn) conn.send({type: 'SECRET', txt: msg});
            }
        }

        function animarGrito(txt) {
            const box = document.getElementById('shout-box');
            box.innerText = txt;
            box.style.transform = "scale(1.2)";
            setTimeout(() => { box.innerText = ""; box.style.transform = "scale(1)"; }, 2000);
        }

        function mostrarMensaje(txt, esSecreto) {
            const chat = document.getElementById('chat-display');
            const div = document.createElement('div');
            div.className = esSecreto ? 'msg msg-team' : 'msg msg-global';
            div.innerText = txt;
            chat.appendChild(div);
            if(chat.childNodes.length > 4) chat.removeChild(chat.firstChild);
        }

        function renderMano() {
            const handDiv = document.getElementById('my-hand');
            const cards = [{v: 1, s: '⚔️'}, {v: 11, s: '🐎'}, {v: 12, s: '👑'}];
            cards.forEach((c, i) => {
                const div = document.createElement('div');
                div.style.position = "absolute";
                div.style.left = `calc(50% - 42px + ${(i - 1) * 95}px)`;
                div.innerHTML = `<div class="card-obj"><b>${c.v}</b><br><br><span style="font-size:2rem">${c.s}</span></div>`;
                handDiv.appendChild(div);
            });
        }
    </script>
</body>
</html>
