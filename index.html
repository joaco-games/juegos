<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TRUCO STACK 🃏</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { 
            --gold: #ffeb3b; 
            --blue-btn: linear-gradient(to bottom, #29b6f6, #0288d1); 
            --yellow-btn: linear-gradient(to bottom, #ffee58, #fbc02d); 
            --team-btn: linear-gradient(to bottom, #66bb6a, #388e3c);
        }
        body { margin: 0; background: #000; font-family: 'Arial Black', sans-serif; color: white; overflow: hidden; touch-action: none; text-align: center; }

        /* --- MENÚ PRINCIPAL --- */
        .menu-container { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; gap: 12px; padding: 20px; overflow-y: auto; }
        .logo { font-size: 3.5rem; font-style: italic; color: var(--gold); text-transform: uppercase; margin-bottom: 5px; }
        
        .btn { width: 95%; max-width: 450px; padding: 18px; border-radius: 50px; border: 4px solid #01579b; font-size: 1.3rem; font-weight: bold; cursor: pointer; color: white; text-shadow: 1px 1px 2px #000; text-transform: uppercase; transition: 0.2s; }
        .btn-rules { background: #333; border-color: #111; font-size: 1rem; padding: 10px; }
        .btn-blue { background: var(--blue-btn); }
        .btn-yellow { background: var(--yellow-btn); color: #3e2723; border-color: #f57f17; }

        /* SELECTOR/BOTÓN DE MODO ONLINE */
        .mode-selector { width: 90%; max-width: 420px; padding: 15px; background: #222; border: 3px solid var(--gold); border-radius: 15px; margin: 5px 0; cursor: pointer; transition: 0.3s; }
        .mode-selector:active { transform: scale(0.95); background: #333; }
        select { width: 100%; padding: 12px; background: #000; color: white; border: 1px solid #555; border-radius: 8px; font-size: 1.1rem; font-weight: bold; cursor: pointer; }

        input { width: 85%; max-width: 400px; padding: 16px; border-radius: 15px; border: none; font-size: 1.1rem; text-align: center; margin: 10px 0; outline: none; }
        
        /* --- UI JUEGO --- */
        #game-ui { display: none; height: 100vh; flex-direction: column; background: radial-gradient(circle, #1b5e20, #0a3d1d); }
        .action-bar { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; padding: 15px; background: rgba(0,0,0,0.8); border-bottom: 2px solid var(--gold); }
        .btn-action { padding: 12px; border-radius: 10px; border: none; font-weight: bold; background: var(--gold); color: #000; font-size: 0.85rem; text-transform: uppercase; }
        .btn-team { background: var(--team-btn); color: white; border: 2px solid #fff; }

        /* CHAT Y MENSAJES */
        #chat-display { position: absolute; top: 130px; left: 15px; right: 15px; height: 140px; display: none; flex-direction: column; gap: 6px; pointer-events: none; }
        .msg { font-size: 0.95rem; padding: 8px 12px; border-radius: 8px; text-align: left; width: fit-content; max-width: 85%; box-shadow: 0 4px 8px rgba(0,0,0,0.3); background: rgba(255,255,255,0.1); }
        .msg-team { background: rgba(76, 175, 80, 0.6); color: #fff; border-left: 5px solid #2e7d32; font-weight: bold; }

        #shout-box { position: absolute; top: 45%; width: 100%; font-size: 3.5rem; color: #fff; text-shadow: 0 0 20px #000; font-style: italic; pointer-events: none; transition: 0.3s; }
        #my-hand { height: 180px; display: flex; justify-content: center; margin-top: auto; margin-bottom: 30px; position: relative; }
        .card-obj { width: 85px; height: 125px; background: white; border-radius: 12px; color: black; padding: 10px; border: 2px solid #999; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
    </style>
</head>
<body>

    <div id="main-menu" class="menu-container">
        <h1 class="logo">TRUCO STACK</h1>
        <button class="btn btn-rules" onclick="alert('Reglas: Truco + Poderes Uno (10, 11, 12).')">📖 REGLAS</button>
        <button class="btn btn-blue" onclick="startJuego('SOLO')">🕹️ MODO SOLITARIO</button>
        
        <hr style="width:90%; opacity:0.3; margin: 10px 0;">

        <button class="btn btn-yellow" onclick="iniciarMesa('LOCAL')">🏠 CREAR MESA LOCAL (Misma Casa)</button>
        
        <hr style="width:90%; opacity:0.3; margin: 10px 0;">

        <div class="mode-selector" id="btn-iniciar-online" onclick="iniciarMesaOnline()">
            <label style="font-size: 0.8rem; display: block; margin-bottom: 5px; color: var(--gold); pointer-events: none;">
                🚀 TOCÁ AQUÍ PARA ARRANCAR:
            </label>
            <select id="online-mode-select" onclick="event.stopPropagation()">
                <option value="2V2">EQUIPOS: 2 VS 2 (Chat Secreto)</option>
                <option value="FFA">TODOS CONTRA TODOS (FFA)</option>
            </select>
            <p style="margin: 8px 0 0 0; font-size: 0.9rem; font-weight: bold; color: #fff; text-transform: uppercase; pointer-events: none;">
                CREAR MESA ONLINE
            </p>
        </div>
        
        <input type="text" id="room-input" placeholder="INGRESAR CÓDIGO DE MESA">
        <button class="btn btn-yellow" onclick="unirse()">🤝 UNIRSE A MESA</button>
        
        <p id="status" style="color:var(--gold); font-weight: bold; margin-top: 10px;"></p>
    </div>

    <div id="game-ui">
        <div class="action-bar">
            <button class="btn-action" onclick="gritar('¡TRUCO!')">⚔️ TRUCO</button>
            <button class="btn-action" onclick="gritar('¡ENVIDO!')">🍀 ENVIDO</button>
            <button class="btn-action btn-team" id="btn-secret" onclick="susurrar()">🤫 SUSURRO TÁCTICO</button>
        </div>
        
        <div id="chat-display"></div>
        <div id="shout-box"></div>
        <div id="my-hand"></div>
    </div>

    <script>
        let peer, conn, modoActual;

        // Función para arrancar desde el nuevo botón/selector
        function iniciarMesaOnline() {
            const select = document.getElementById('online-mode-select');
            modoActual = select.value;
            
            // Efecto visual de pulsado manual
            const btn = document.getElementById('btn-iniciar-online');
            btn.style.transform = "scale(0.95)";
            
            setTimeout(() => {
                btn.style.transform = "scale(1)";
                const code = modoActual + "-" + Math.random().toString(36).substring(2, 5).toUpperCase();
                generarPeer(code);
            }, 150);
        }

        function iniciarMesa(tipo) {
            modoActual = tipo;
            generarPeer(tipo + "-" + Math.random().toString(36).substring(2, 5).toUpperCase());
        }

        function generarPeer(id) {
            peer = new Peer(id);
            peer.on('open', (id) => {
                document.getElementById('status').innerText = "ID DE MESA: " + id;
                alert("Mesa creada: " + id);
            });
            peer.on('connection', (c) => {
                conn = c;
                conn.on('data', (data) => {
                    if(data.type === 'JOIN') startJuego();
                    if(data.type === 'SHOUT') animarGrito(data.txt);
                    if(data.type === 'SECRET') recibirSusurro(data.txt);
                });
                alert("¡Jugador conectado!");
            });
        }

        function unirse() {
            const code = document.getElementById('room-input').value.toUpperCase();
            if(!code) return alert("Ingresa un código");
            modoActual = code.includes('2V2') ? '2V2' : (code.includes('FFA') ? 'FFA' : 'LOCAL');
            peer = new Peer();
            peer.on('open', () => {
                conn = peer.connect(code);
                conn.on('open', () => {
                    conn.send({type: 'JOIN'});
                    startJuego();
                });
            });
        }

        function gritar(txt) {
            animarGrito(txt);
            if(conn) conn.send({type: 'SHOUT', txt: txt});
        }

        function susurrar() {
            const msg = prompt("Mensaje secreto para tu compañero:");
            if(msg) {
                mostrarMensajeInApp("Tú: " + msg, true);
                if(conn) conn.send({type: 'SECRET', txt: msg});
            }
        }

        function recibirSusurro(txt) {
            if (window.navigator.vibrate) window.navigator.vibrate([200, 100, 200]); 
            mostrarMensajeInApp("Compañero: " + txt, true);
        }

        function animarGrito(txt) {
            const box = document.getElementById('shout-box');
            box.innerText = txt;
            box.style.transform = "scale(1.3)";
            setTimeout(() => { box.innerText = ""; box.style.transform = "scale(1)"; }, 2000);
        }

        function mostrarMensajeInApp(txt, secreto) {
            const chat = document.getElementById('chat-display');
            const div = document.createElement('div');
            div.className = secreto ? 'msg msg-team' : 'msg';
            div.innerText = txt;
            chat.appendChild(div);
            if(chat.childNodes.length > 3) chat.removeChild(chat.firstChild);
        }

        function startJuego() {
            document.getElementById('main-menu').style.display = 'none';
            document.getElementById('game-ui').style.display = 'flex';
            if(modoActual === '2V2' || modoActual === 'FFA') document.getElementById('chat-display').style.display = 'flex';
            if(modoActual !== '2V2') document.getElementById('btn-secret').style.display = 'none';
            renderMano();
        }

        function renderMano() {
            const handDiv = document.getElementById('my-hand');
            const cards = [{v: 1, s: '⚔️'}, {v: 7, s: '🟡'}, {v: 12, s: '👑'}];
            cards.forEach((c, i) => {
                const div = document.createElement('div');
                div.style.position = "absolute";
                div.style.left = `calc(50% - 42px + ${(i - 1) * 95}px)`;
                div.innerHTML = `<div class="card-obj"><b>${c.v}</b><br><br><span style="font-size:2rem">${c.s}</span></div>`;
                handDiv.appendChild(div);
            });
        }
    </script>
</body>
</html>
