<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TRUCO-STACK ONLINE</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --gold: #ffd700; --green: radial-gradient(circle, #1b5e20, #0a3d1d); --red: #ff1744; }
        body { margin: 0; background: #000; font-family: 'Segoe UI', sans-serif; color: white; overflow: hidden; }
        
        /* Menú Online */
        .overlay { position: fixed; inset: 0; background: var(--green); z-index: 1000; display: flex; justify-content: center; align-items: center; text-align: center; }
        .overlay:not(.active) { display: none; }
        .menu-card { background: rgba(0,0,0,0.6); padding: 30px; border-radius: 30px; border: 2px solid var(--gold); width: 80%; max-width: 400px; backdrop-filter: blur(10px); }
        
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 10px; border: none; text-align: center; font-size: 1.1rem; }
        .btn { background: linear-gradient(to bottom, #ffeb3b, #fbc02d); border: none; padding: 15px; font-size: 1.1rem; font-weight: bold; border-radius: 50px; color: #3e2723; cursor: pointer; width: 100%; margin: 5px 0; }
        
        /* Juego */
        #game-ui { height: 100vh; display: none; flex-direction: column; background: var(--green); }
        .header { display: flex; justify-content: space-between; padding: 45px 20px 10px; }
        .status-bar { background: rgba(0,0,0,0.5); padding: 5px 15px; border-radius: 15px; border: 1px solid var(--gold); font-size: 0.8rem; }
        
        .table { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 20px; }
        .card-slot { width: 85px; height: 130px; border: 2px dashed rgba(255,255,255,0.3); border-radius: 12px; position: relative; display: flex; align-items: center; justify-content: center; }
        
        .card-obj { width: 85px; height: 130px; background: white; border-radius: 10px; color: black; display: flex; flex-direction: column; justify-content: space-between; padding: 10px; box-sizing: border-box; box-shadow: 0 5px 15px rgba(0,0,0,0.5); position: absolute; }

        .hand-area { height: 160px; width: 100%; position: relative; margin-bottom: 30px; }
        .hand { display: flex; justify-content: center; }
        .hand .card-obj { position: absolute; cursor: pointer; transition: 0.2s; bottom: 0; }
        
        #msg { position: fixed; top: 30%; width: 100%; text-align: center; font-size: 1.5rem; color: var(--gold); pointer-events: none; z-index: 2000; text-shadow: 2px 2px 5px #000; }
    </style>
</head>
<body>

    <div id="lobby" class="overlay active">
        <div class="menu-card">
            <img src="https://github.com/joaco-games/juegos/blob/main/icono..png?raw=true" style="width:80px; border-radius:20px; border:2px solid var(--gold)">
            <h2 style="color:var(--gold)">ONLINE ARENA</h2>
            
            <div id="setup-controls">
                <button class="btn" onclick="startAsHost()">CREAR MESA</button>
                <div style="margin: 15px 0; opacity: 0.5;">— O —</div>
                <input type="text" id="join-id" placeholder="ID de la Mesa">
                <button class="btn" onclick="joinRoom()">UNIRSE A MESA</button>
            </div>
            
            <div id="waiting-area" style="display:none;">
                <p>Tu ID de Mesa: <b id="my-id" style="color:var(--gold)">...</b></p>
                <p>Jugadores conectados: <span id="player-count">1</span>/4</p>
                <button class="btn" id="start-btn" style="display:none;" onclick="broadcastStart()">EMPEZAR JUEGO</button>
            </div>
        </div>
    </div>

    <div id="game-ui">
        <div class="header">
            <div class="status-bar">ID: <span id="room-label"></span></div>
            <div class="status-bar">TURNO: <b id="turn-label">Esperando...</b></div>
        </div>
        
        <div class="table">
            <div id="msg"></div>
            <div style="display:flex; gap:20px;">
                <div class="card-slot" onclick="requestCard()">MAZO</div>
                <div id="discard-pile" class="card-slot"></div>
            </div>
        </div>

        <div class="hand-area">
            <div id="player-hand" class="hand"></div>
        </div>
    </div>

    <script>
        let peer, conn, connections = [];
        let isHost = false;
        let myIdInGame = 0;
        let gameState = {
            deck: [],
            discard: null,
            hands: [],
            turn: 0,
            scores: [0,0,0,0]
        };

        const suits = [{n:'Espadas',s:'⚔️',c:'#1976d2'},{n:'Bastos',s:'🪵',c:'#388e3c'},{n:'Oros',s:'🟡',c:'#fbc02d'},{n:'Copas',s:'🏆',c:'#d32f2f'}];
        const values = [1,2,3,4,5,6,7,10,11,12];

        // INICIAR COMO HOST
        function startAsHost() {
            isHost = true;
            peer = new Peer('mesa-' + Math.floor(Math.random()*9999));
            peer.on('open', id => {
                showWaiting(id);
                document.getElementById('start-btn').style.display = 'block';
            });
            peer.on('connection', c => {
                if(connections.length >= 3) return c.close();
                connections.push(c);
                updateLobby();
                c.on('data', data => handleData(data, connections.indexOf(c) + 1));
            });
        }

        // UNIRSE A UNA MESA
        function joinRoom() {
            const targetId = document.getElementById('join-id').value;
            peer = new Peer();
            peer.on('open', () => {
                conn = peer.connect(targetId);
                conn.on('open', () => {
                    showWaiting(targetId);
                    document.getElementById('waiting-area').innerHTML = "<p>Conectado. Esperando al anfitrión...</p>";
                });
                conn.on('data', data => handleData(data, 0));
            });
        }

        function handleData(data, senderIndex) {
            if(data.type === 'START') {
                gameState = data.state;
                myIdInGame = isHost ? 0 : senderIndex || connections.length; // Simplificado
                startGameUI();
            }
            if(data.type === 'UPDATE') {
                gameState = data.state;
                render();
            }
        }

        function broadcastStart() {
            // Crear mazo y repartir
            gameState.deck = [];
            suits.forEach(s => values.forEach(v => gameState.deck.push({suit:s, value:v})));
            gameState.deck.sort(() => Math.random() - 0.5);
            
            for(let i=0; i<4; i++) {
                gameState.hands[i] = [];
                for(let j=0; j<5; j++) gameState.hands[i].push(gameState.deck.pop());
            }
            gameState.discard = gameState.deck.pop();
            
            connections.forEach((c, idx) => {
                c.send({type: 'START', state: gameState, playerIdx: idx + 1});
            });
            myIdInGame = 0;
            startGameUI();
        }

        function startGameUI() {
            document.getElementById('lobby').classList.remove('active');
            document.getElementById('game-ui').style.display = 'flex';
            render();
        }

        function render() {
            document.getElementById('discard-pile').innerHTML = createCardHTML(gameState.discard);
            document.getElementById('turn-label').innerText = gameState.turn === myIdInGame ? "TU TURNO" : "JUGADOR " + (gameState.turn + 1);
            
            const handDiv = document.getElementById('player-hand');
            handDiv.innerHTML = '';
            const myHand = gameState.hands[myIdInGame] || [];
            
            myHand.forEach((card, i) => {
                const cardEl = document.createElement('div');
                cardEl.className = 'card-obj';
                cardEl.innerHTML = `<b>${card.value}</b><div style="font-size:2rem;text-align:center">${card.suit.s}</div><b style="align-self:flex-end;transform:rotate(180deg)">${card.value}</b>`;
                cardEl.style.color = card.suit.c;
                cardEl.style.left = `calc(50% - 40px + ${(i - (myHand.length-1)/2)*50}px)`;
                cardEl.onclick = () => playCard(i);
                handDiv.appendChild(cardEl);
            });
        }

        function playCard(i) {
            if(gameState.turn !== myIdInGame) return showMsg("No es tu turno");
            const card = gameState.hands[myIdInGame][i];
            
            if(card.suit.n === gameState.discard.suit.n || card.value === gameState.discard.value) {
                gameState.discard = card;
                gameState.hands[myIdInGame].splice(i, 1);
                gameState.turn = (gameState.turn + 1) % 4;
                sync();
            } else {
                showMsg("Carta no válida");
            }
        }

        function requestCard() {
            if(gameState.turn !== myIdInGame) return;
            if(gameState.deck.length > 0) {
                gameState.hands[myIdInGame].push(gameState.deck.pop());
                gameState.turn = (gameState.turn + 1) % 4;
                sync();
            }
        }

        function sync() {
            if(isHost) {
                connections.forEach(c => c.send({type: 'UPDATE', state: gameState}));
                render();
            } else {
                conn.send({type: 'UPDATE', state: gameState});
            }
        }

        function createCardHTML(card) {
            return `<div class="card-obj" style="color:${card.suit.c}"><b>${card.value}</b><div style="font-size:2rem;text-align:center">${card.suit.s}</div><b style="align-self:flex-end;transform:rotate(180deg)">${card.value}</b></div>`;
        }

        function showMsg(t) {
            const m = document.getElementById('msg');
            m.innerText = t;
            setTimeout(() => m.innerText = "", 1500);
        }

        function showWaiting(id) {
            document.getElementById('setup-controls').style.display = 'none';
            document.getElementById('waiting-area').style.display = 'block';
            document.getElementById('my-id').innerText = id;
            document.getElementById('room-label').innerText = id;
        }

        function updateLobby() {
            document.getElementById('player-count').innerText = connections.length + 1;
        }
    </script>
</body>
</html>
