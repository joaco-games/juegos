<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TRUCO-STACK ONLINE</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --gold: #ffd700; --green: radial-gradient(circle, #1b5e20, #0a3d1d); }
        body { margin: 0; background: #000; font-family: 'Arial Black', sans-serif; color: white; overflow: hidden; touch-action: none; }

        /* CINEMÁTICA */
        #intro-cinematic { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; justify-content: center; align-items: center; }
        .fn-text { font-family: 'Impact', sans-serif; font-size: 5rem; color: #fff; font-style: italic; text-shadow: 0 0 20px rgba(255,215,0,0.5); animation: fIn 3s ease forwards; opacity: 0; }
        @keyframes fIn { 0% { transform: scale(2); opacity: 0; } 15% { transform: scale(1); opacity: 1; 85% { opacity: 1; } 100% { transform: scale(0.8); opacity: 0; } }

        /* INTERFAZ */
        .overlay { position: fixed; inset: 0; background: var(--green); z-index: 1000; display: flex; justify-content: center; align-items: center; text-align: center; }
        .overlay:not(.active) { display: none; }
        .menu-card { background: rgba(0,0,0,0.85); padding: 25px; border-radius: 30px; border: 3px solid var(--gold); width: 85%; max-width: 400px; backdrop-filter: blur(15px); }
        
        .btn { background: linear-gradient(to bottom, #ffeb3b, #fbc02d); border: none; padding: 15px; font-size: 1.1rem; font-weight: bold; border-radius: 50px; color: #3e2723; width: 100%; margin: 8px 0; box-shadow: 0 4px 0 #bda06d; }
        .btn-blue { background: linear-gradient(to bottom, #4fc3f7, #0288d1); color: white; box-shadow: 0 4px 0 #01579b; }

        #game-ui { height: 100vh; display: none; flex-direction: column; background: var(--green); }
        .header { display: flex; justify-content: space-between; padding: 50px 15px 10px; }
        .score-box { background: rgba(0,0,0,0.7); padding: 5px 12px; border-radius: 12px; border: 1px solid var(--gold); font-size: 0.8rem; }

        .table { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .hand-area { height: 160px; width: 100%; position: relative; margin-bottom: 20px; }
        .hand { display: flex; justify-content: center; width: 100%; height: 100%; position: relative; }

        .card-obj { 
            width: 80px; height: 115px; background: white; border-radius: 10px; color: black; 
            display: flex; flex-direction: column; justify-content: space-between; padding: 8px; 
            box-sizing: border-box; box-shadow: 0 5px 15px rgba(0,0,0,0.4); 
            position: absolute; transition: all 0.3s ease; border: 1px solid #ccc;
        }

        #msg-pop { position: fixed; top: 30%; width: 100%; text-align: center; font-size: 2.5rem; color: var(--gold); pointer-events: none; opacity: 0; z-index: 2000; }
        .anim-msg { animation: pop 1.2s forwards; }
        @keyframes pop { 0% { opacity:0; transform:scale(0.5); } 30% { opacity:1; transform:scale(1.2); } 100% { opacity:0; transform:translateY(-50px); } }
    </style>
</head>
<body>

    <div id="intro-cinematic"><div class="fn-text">TRUCO STACK</div></div>
    <div id="msg-pop"></div>

    <div id="lobby" class="overlay active">
        <div class="menu-card">
            <h1 style="color:var(--gold)">TRUCO STACK</h1>
            <button class="btn btn-blue" onpointerdown="startSolo()">SOLITARIO</button>
            <hr style="opacity:0.3">
            <button class="btn" onpointerdown="initOnline(true)">CREAR MESA</button>
            <input type="text" id="join-id" placeholder="ID de la Mesa" style="width:80%; padding:10px; border-radius:10px; margin:10px 0; text-align:center; border:none;">
            <button class="btn" onpointerdown="initOnline(false)">UNIRSE</button>
            <div id="waiting" style="display:none; margin-top:10px;">
                <p>MESA: <b id="display-id" style="color:var(--gold)">...</b></p>
                <button class="btn" id="start-btn" style="display:none;" onpointerdown="hostStart()">¡REPARTIR!</button>
            </div>
        </div>
    </div>

    <div id="game-ui">
        <div class="header">
            <div class="score-box" id="scores">TÚ: 0 | RIVAL: 0</div>
            <div class="score-box"><b id="turn-label">Esperando...</b></div>
        </div>
        <div class="table">
            <div style="display:flex; gap:20px;">
                <div class="card-obj" style="position:static; background:#222; border:2px dashed #444; color:white;" onpointerdown="drawCard()">MAZO</div>
                <div id="discard-pile"></div>
            </div>
        </div>
        <div class="hand-area"><div id="player-hand" class="hand"></div></div>
    </div>

    <script>
        // --- CONFIGURACIÓN BASE ---
        setTimeout(() => document.getElementById('intro-cinematic')?.remove(), 3200);

        let peer, conn;
        let isHost = false, isSolo = false;
        let myIdx = 0, score = [0, 0];
        let state = { deck: [], discard: null, hands: [[], []], turn: 0 };
        const suits = [{n:'Espadas',s:'⚔️',c:'#1976d2'},{n:'Bastos',s:'🪵',c:'#388e3c'},{n:'Oros',s:'🟡',c:'#fbc02d'},{n:'Copas',s:'🏆',c:'#d32f2f'}];
        const values = [1,2,3,4,5,6,7,10,11,12];

        // --- LÓGICA ONLINE ---
        function initOnline(host) {
            isHost = host;
            isSolo = false;
            const id = host ? 'TRUCO-' + Math.floor(Math.random()*999) : document.getElementById('join-id').value;
            if(!id) return alert("ID necesario");

            peer = new Peer(host ? id : undefined);
            peer.on('open', (myID) => {
                document.getElementById('waiting').style.display = 'block';
                document.getElementById('display-id').innerText = host ? myID : id;
                if(!host) {
                    conn = peer.connect(id);
                    setupConn();
                }
            });
            peer.on('connection', (c) => {
                conn = c;
                setupConn();
                document.getElementById('start-btn').style.display = 'block';
            });
        }

        function setupConn() {
            conn.on('data', (data) => {
                if(data.type === 'SYNC') {
                    state = data.state;
                    myIdx = isHost ? 0 : 1;
                    score = data.score;
                    startUI();
                }
                if(data.type === 'MSG') notify(data.txt);
            });
        }

        function startSolo() { isSolo = true; myIdx = 0; hostStart(); }
        function startUI() { document.getElementById('lobby').classList.remove('active'); document.getElementById('game-ui').style.display = 'flex'; render(); }

        function hostStart() {
            state.deck = [];
            suits.forEach(s => values.forEach(v => state.deck.push({suit:s, value:v})));
            state.deck.sort(() => Math.random() - 0.5);
            state.hands = [[], []];
            for(let i=0; i<4; i++) { state.hands[0].push(state.deck.pop()); state.hands[1].push(state.deck.pop()); }
            state.discard = state.deck.pop();
            state.turn = 0;
            if(!isSolo) sync();
            startUI();
        }

        // --- LÓGICA DE JUEGO ---
        function playCard(i) {
            if(state.turn !== myIdx) return;
            const card = state.hands[myIdx][i];
            if(card.suit.n === state.discard.suit.n || card.value === state.discard.value) {
                applyPower(card);
                state.discard = card;
                state.hands[myIdx].splice(i, 1);
                
                if(state.hands[myIdx].length === 0) {
                    score[myIdx]++;
                    notify("¡GANASTE LA RONDA!");
                    setTimeout(hostStart, 2000);
                } else {
                    if(card.value !== 10) state.turn = isSolo ? (state.turn === 0 ? 1 : 0) : (myIdx === 0 ? 1 : 0);
                    else notify("¡TURNO EXTRA!");
                }
                sync();
            }
        }

        function drawCard() {
            if(state.turn !== myIdx) return;
            if(state.deck.length) {
                state.hands[myIdx].push(state.deck.pop());
                state.turn = isSolo ? 1 : (myIdx === 0 ? 1 : 0);
                sync();
            }
        }

        function applyPower(card) {
            const rival = myIdx === 0 ? 1 : 0;
            if(card.value === 7 && (card.suit.n === 'Oros' || card.suit.n === 'Espadas')) {
                for(let k=0; k<2; k++) if(state.deck.length) state.hands[rival].push(state.deck.pop());
                notify("+2 AL RIVAL", true);
            }
            if(card.value === 12) {
                notify("SALTO DE TURNO", true);
                state.turn = myIdx; // Mantiene el turno el que la tiró
            }
        }

        function sync() {
            if(isSolo) { render(); if(state.turn === 1) setTimeout(iaMove, 1200); return; }
            conn.send({ type: 'SYNC', state: state, score: score });
            render();
        }

        function notify(txt, broadcast = false) {
            const m = document.getElementById('msg-pop');
            m.innerText = txt; m.classList.remove('anim-msg');
            void m.offsetWidth; m.classList.add('anim-msg');
            if(broadcast && conn) conn.send({ type: 'MSG', txt: txt });
        }

        function render() {
            document.getElementById('scores').innerText = `TÚ: ${score[myIdx]} | RIVAL: ${score[myIdx === 0 ? 1 : 0]}`;
            document.getElementById('turn-label').innerText = state.turn === myIdx ? "TU TURNO" : "RIVAL...";
            document.getElementById('discard-pile').innerHTML = createCardHTML(state.discard);
            
            const handDiv = document.getElementById('player-hand');
            handDiv.innerHTML = '';
            const overlap = Math.min(65, (window.innerWidth * 0.85) / state.hands[myIdx].length);

            state.hands[myIdx].forEach((card, i) => {
                const c = document.createElement('div');
                c.className = 'card-obj';
                c.style.color = card.suit.c;
                c.style.left = `calc(50% - 40px + ${(i - (state.hands[myIdx].length-1)/2) * overlap}px)`;
                c.style.zIndex = i;
                c.innerHTML = `<b>${card.value}</b><div style="font-size:1.8rem;text-align:center">${card.suit.s}</div><b style="align-self:flex-end;transform:rotate(180deg)">${card.value}</b>`;
                c.onpointerdown = (e) => { e.preventDefault(); playCard(i); };
                handDiv.appendChild(c);
            });
        }

        function iaMove() {
            let h = state.hands[1];
            let idx = h.findIndex(c => c.suit.n === state.discard.suit.n || c.value === state.discard.value);
            if(idx !== -1) {
                const c = h[idx];
                if(c.value === 12) state.turn = 1; else if(c.value !== 10) state.turn = 0;
                state.discard = h.splice(idx, 1)[0];
                if(h.length === 0) { score[1]++; notify("IA GANA"); setTimeout(hostStart, 1500); }
            } else {
                if(state.deck.length) h.push(state.deck.pop());
                state.turn = 0;
            }
            render();
        }

        function createCardHTML(c) {
            return `<div class="card-obj" style="position:static; color:${c.suit.c}"><b>${c.value}</b><div style="font-size:1.8rem;text-align:center">${c.suit.s}</div><b style="align-self:flex-end;transform:rotate(180deg)">${c.value}</b></div>`;
        }
    </script>
</body>
</html>
