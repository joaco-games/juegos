<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TRUCO-STACK ARENA</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="https://github.com/joaco-games/juegos/blob/main/icono..png?raw=true">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        :root { --gold: #ffd700; --green-bg: radial-gradient(circle, #1b5e20, #0a3d1d); --red: #ff1744; }
        body { margin: 0; background: #000; font-family: sans-serif; color: white; overflow: hidden; touch-action: manipulation; }
        
        .overlay { position: fixed; inset: 0; background: var(--green-bg); z-index: 1000; display: flex; justify-content: center; align-items: center; transition: 0.5s; text-align: center; }
        .overlay:not(.active) { opacity: 0; visibility: hidden; transform: translateY(-100%); }
        
        .menu-card { background: rgba(0,0,0,0.4); padding: 25px; border-radius: 30px; border: 2px solid var(--gold); width: 85%; max-width: 400px; backdrop-filter: blur(10px); }
        .btn { background: linear-gradient(to bottom, #ffeb3b, #fbc02d); border: none; padding: 15px; font-size: 1.2rem; font-weight: bold; border-radius: 50px; color: #3e2723; cursor: pointer; width: 100%; margin: 10px 0; box-shadow: 0 4px 0 #bda06d; }
        
        #game-container { height: 100vh; background: var(--green-bg); display: flex; flex-direction: column; visibility: hidden; }
        #game-container.active { visibility: visible; }
        
        .header { display: flex; justify-content: space-between; padding: 45px 20px 10px; }
        .stat { background: rgba(0,0,0,0.6); padding: 8px 15px; border-radius: 20px; border: 1px solid var(--gold); font-size: 0.8rem; }
        
        .table { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 20px; }
        .turn-indicator { font-size: 1.2rem; color: var(--gold); font-weight: bold; text-shadow: 0 2px 4px #000; }
        
        .slots { display: flex; gap: 20px; }
        .card-slot { width: 80px; height: 120px; border: 2px dashed rgba(255,255,255,0.2); border-radius: 10px; display: flex; align-items: center; justify-content: center; position: relative; }
        
        .card-obj { width: 80px; height: 120px; background: white; border-radius: 8px; color: black; display: flex; flex-direction: column; justify-content: space-between; padding: 8px; box-sizing: border-box; box-shadow: 0 4px 10px rgba(0,0,0,0.5); position: absolute; }
        .card-hidden { background: #3e2723; border: 2px solid var(--gold); }

        .hand-area { height: 160px; position: relative; width: 100%; margin-bottom: 20px; }
        .hand { display: flex; justify-content: center; width: 100%; position: absolute; bottom: 0; }
        .hand .card-obj { position: absolute; cursor: pointer; transition: 0.3s; }

        #announcement { position: fixed; top: 35%; width: 100%; text-align: center; font-size: 2rem; color: var(--gold); text-shadow: 0 0 10px #000; pointer-events: none; opacity: 0; z-index: 2000; }
        .pop { animation: pop 1.2s forwards; }
        @keyframes pop { 0% { opacity: 0; transform: scale(0.5); } 20% { opacity: 1; transform: scale(1.1); } 100% { opacity: 0; transform: translateY(-30px); } }

        /* Pantalla Intermedia para Multijugador */
        #pass-screen { background: #000; z-index: 3000; }
    </style>
</head>
<body>

    <div id="start-screen" class="overlay active">
        <div class="menu-card">
            <h1 style="margin:0; color:var(--gold)">TRUCO-STACK</h1>
            <p style="font-size:0.8rem; opacity:0.8">Joaco Games & AI</p>
            <button class="btn" onclick="initMode('solo')">SOLITARIO (VS IA)</button>
            <button class="btn" onclick="initMode('multi')">4 JUGADORES (LOCAL)</button>
        </div>
    </div>

    <div id="pass-screen" class="overlay">
        <div class="menu-card">
            <h2 id="pass-msg">Jugador 1, es tu turno</h2>
            <button class="btn" onclick="hidePassScreen()">VER MIS CARTAS</button>
        </div>
    </div>

    <div id="game-container">
        <div class="header">
            <div class="stat">Puntos: <span id="score">0</span></div>
            <div class="stat">Mazo: <span id="deck-count">40</span></div>
        </div>
        
        <div class="table">
            <div id="current-turn" class="turn-indicator">Esperando...</div>
            <div class="slots">
                <div class="card-slot" onclick="drawCard()" style="background:rgba(255,255,255,0.05)">ROBAR</div>
                <div id="discard-pile" class="card-slot"></div>
            </div>
        </div>

        <div id="announcement"></div>
        <div class="hand-area"><div id="player-hand" class="hand"></div></div>
    </div>

    <script>
        const suits = [{n:'Espadas',s:'⚔️',c:'#1976d2'},{n:'Bastos',s:'🪵',c:'#388e3c'},{n:'Oros',s:'🟡',c:'#fbc02d'},{n:'Copas',s:'🏆',c:'#d32f2f'}];
        const values = [1,2,3,4,5,6,7,10,11,12];
        let deck=[], players=[], currentPlayer=0, discardCard=null, gameMode='solo';

        function initMode(mode) {
            gameMode = mode;
            document.getElementById('start-screen').classList.remove('active');
            document.getElementById('game-container').classList.add('active');
            setupGame();
        }

        function setupGame() {
            deck = [];
            suits.forEach(s => values.forEach(v => deck.push({suit:s, value:v})));
            deck.sort(() => Math.random() - 0.5);
            
            players = [];
            let numPlayers = gameMode === 'solo' ? 2 : 4;
            for(let i=0; i<numPlayers; i++) {
                players.push({ id: i, name: i===0?'Tú':(gameMode==='solo'?'IA':'J'+(i+1)), hand: [], score: 0 });
                for(let j=0; j<5; j++) players[i].hand.push(deck.pop());
            }
            discardCard = deck.pop();
            currentPlayer = 0;
            render();
        }

        function render() {
            document.getElementById('discard-pile').innerHTML = createCardHTML(discardCard);
            document.getElementById('deck-count').innerText = deck.length;
            document.getElementById('score').innerText = players[0].score;
            document.getElementById('current-turn').innerText = `Turno de: ${players[currentPlayer].name}`;

            const handDiv = document.getElementById('player-hand');
            handDiv.innerHTML = '';
            
            // Si es modo multi y no es el turno visible, ocultamos
            let activeHand = players[currentPlayer].hand;
            const cardWidth = 80;
            const containerWidth = window.innerWidth;
            const overlap = Math.min(cardWidth - 10, (activeHand.length * cardWidth - containerWidth) / (activeHand.length - 1));
            
            activeHand.forEach((card, i) => {
                const cardEl = document.createElement('div');
                cardEl.className = 'card-obj';
                cardEl.innerHTML = `<b>${card.value}</b><div style="font-size:2rem;text-align:center">${card.suit.s}</div><b style="align-self:flex-end;transform:rotate(180deg)">${card.value}</b>`;
                cardEl.style.color = card.suit.c;
                cardEl.style.left = `${(containerWidth - (activeHand.length*cardWidth - (activeHand.length-1)*overlap))/2 + i*(cardWidth-overlap)}px`;
                cardEl.style.zIndex = i;
                cardEl.onclick = () => playCard(i);
                handDiv.appendChild(cardEl);
            });
        }

        function playCard(i) {
            if (gameMode === 'solo' && currentPlayer !== 0) return;
            
            const card = players[currentPlayer].hand[i];
            if (card.suit.n === discardCard.suit.n || card.value === discardCard.value) {
                discardCard = card;
                players[currentPlayer].hand.splice(i, 1);
                players[currentPlayer].score += (card.value <= 3 ? 50 : 10);
                
                if(players[currentPlayer].hand.length === 0) {
                    alert("¡GANÓ " + players[currentPlayer].name + "!");
                    location.reload();
                    return;
                }
                nextTurn();
            } else {
                notify("¡Carta no válida!");
            }
        }

        function nextTurn() {
            currentPlayer = (currentPlayer + 1) % players.length;
            if (gameMode === 'solo' && currentPlayer === 1) {
                render();
                setTimeout(iaPlay, 1000);
            } else if (gameMode === 'multi') {
                showPassScreen();
            } else {
                render();
            }
        }

        function iaPlay() {
            let possibleMoves = players[1].hand.filter(c => c.suit.n === discardCard.suit.n || c.value === discardCard.value);
            if (possibleMoves.length > 0) {
                // La IA tira la carta de más valor de truco si puede
                possibleMoves.sort((a,b) => a.value - b.value);
                let move = players[1].hand.indexOf(possibleMoves[0]);
                discardCard = players[1].hand[move];
                players[1].hand.splice(move, 1);
                notify("IA jugó " + discardCard.value);
            } else {
                if(deck.length > 0) players[1].hand.push(deck.pop());
                notify("IA robó carta");
            }
            nextTurn();
        }

        function drawCard() {
            if (gameMode === 'solo' && currentPlayer !== 0) return;
            if(deck.length > 0) {
                players[currentPlayer].hand.push(deck.pop());
                nextTurn();
            }
        }

        function showPassScreen() {
            document.getElementById('pass-msg').innerText = `Turno de ${players[currentPlayer].name}. Pasa el celular.`;
            document.getElementById('pass-screen').classList.add('active');
        }

        function hidePassScreen() {
            document.getElementById('pass-screen').classList.remove('active');
            render();
        }

        function createCardHTML(card) {
            return `<div class="card-obj" style="color:${card.suit.c}"><b>${card.value}</b><div style="font-size:2rem;text-align:center">${card.suit.s}</div><b style="align-self:flex-end;transform:rotate(180deg)">${card.value}</b></div>`;
        }

        function notify(txt) {
            const el = document.getElementById('announcement');
            el.innerText = txt; el.className = 'pop';
            setTimeout(() => el.className = '', 1200);
        }
    </script>
</body>
</html>
