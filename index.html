<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TRUCO-STACK 4P</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --gold: #ffd700; --green: radial-gradient(circle, #1b5e20, #0a3d1d); }
        body { margin: 0; background: #000; font-family: 'Arial Black', sans-serif; color: white; overflow: hidden; touch-action: none; }

        /* LOBBY */
        .overlay { position: fixed; inset: 0; background: var(--green); z-index: 1000; display: flex; justify-content: center; align-items: center; text-align: center; }
        .overlay:not(.active) { display: none; }
        .menu-card { background: rgba(0,0,0,0.9); padding: 25px; border-radius: 30px; border: 3px solid var(--gold); width: 85%; max-width: 380px; }
        
        .btn { background: linear-gradient(to bottom, #ffeb3b, #fbc02d); border: none; padding: 12px; font-size: 1rem; font-weight: bold; border-radius: 50px; color: #3e2723; width: 100%; margin: 8px 0; cursor: pointer; }
        .mode-btn { background: #444; color: white; border: 2px solid transparent; }
        .mode-btn.selected { border-color: var(--gold); background: #222; }

        /* MESA DE JUEGO */
        #game-ui { height: 100vh; display: none; flex-direction: column; background: var(--green); position: relative; }
        .table { flex: 1; display: flex; justify-content: center; align-items: center; position: relative; }
        
        /* POSICIONES DE JUGADORES */
        .player-label { position: absolute; background: rgba(0,0,0,0.6); padding: 5px 10px; border-radius: 10px; font-size: 0.7rem; border: 1px solid #555; }
        .p0 { bottom: 180px; color: var(--gold); } /* Vos */
        .p1 { left: 10px; top: 50%; transform: rotate(90deg); }
        .p2 { top: 60px; }
        .p3 { right: 10px; top: 50%; transform: rotate(-90deg); }

        .card-obj { 
            width: 75px; height: 110px; background: white; border-radius: 10px; color: black; 
            display: flex; flex-direction: column; justify-content: space-between; padding: 8px; 
            box-sizing: border-box; box-shadow: 0 4px 10px rgba(0,0,0,0.5); position: absolute; 
            transition: all 0.4s ease; border: 1px solid #999;
        }

        .hand-area { height: 140px; width: 100%; position: relative; margin-bottom: 20px; }
        .hand { display: flex; justify-content: center; width: 100%; height: 100%; position: relative; }

        #msg-pop { position: fixed; top: 30%; width: 100%; text-align: center; font-size: 2rem; color: var(--gold); pointer-events: none; opacity: 0; z-index: 2000; }
        .anim { animation: pop 1.5s forwards; }
        @keyframes pop { 0% {opacity:0; transform:scale(0.5);} 30% {opacity:1; transform:scale(1.1);} 100% {opacity:0; transform:translateY(-40px);} }
    </style>
</head>
<body>

    <div id="msg-pop"></div>

    <div id="lobby" class="overlay active">
        <div class="menu-card">
            <h2 style="color:var(--gold)">TRUCO-STACK 4P</h2>
            
            <div id="setup">
                <div style="display:flex; gap:5px; margin-bottom:15px;">
                    <button id="m-ffa" class="btn mode-btn selected" onclick="setMode('ffa')">TODO vs TODO</button>
                    <button id="m-2v2" class="btn mode-btn" onclick="setMode('2v2')">2 vs 2</button>
                </div>
                <button class="btn" onclick="hostRoom()">CREAR MESA</button>
                <input type="text" id="join-id" placeholder="CÓDIGO" style="width:70%; padding:10px; margin-top:10px; text-align:center; border-radius:10px; border:none;">
                <button class="btn" onclick="joinRoom()">UNIRSE</button>
            </div>

            <div id="waiting" style="display:none;">
                <p>CÓDIGO: <b id="room-code" style="color:var(--gold); font-size:1.8rem;">---</b></p>
                <p id="count">Conectados: 1 / 4</p>
                <div id="player-list" style="font-size:0.8rem; margin-bottom:15px; opacity:0.7;"></div>
                <button class="btn" id="btn-start" style="display:none;" onclick="startGame()">¡REPARTIR!</button>
            </div>
        </div>
    </div>

    <div id="game-ui">
        <div class="player-label p0" id="label-0">TÚ (P1)</div>
        <div class="player-label p1" id="label-1">P2</div>
        <div class="player-label p2" id="label-2">P3</div>
        <div class="player-label p3" id="label-3">P4</div>

        <div class="table">
            <div class="card-obj" style="position:static; background:#222; border:2px dashed #444; color:white; display:flex; align-items:center; justify-content:center;" onclick="drawCard()">MAZO</div>
            <div id="discard-pile" style="margin-left:20px;"></div>
        </div>

        <div class="hand-area"><div id="player-hand" class="hand"></div></div>
    </div>

    <script>
        let peer, connections = [];
        let isHost = false, myIdx = 0;
        let gameMode = 'ffa'; // 'ffa' o '2v2'
        let score = [0, 0, 0, 0]; 
        let teamScore = [0, 0]; // Para 2v2 (Equipo A: 0 y 2, Equipo B: 1 y 3)
        let state = { deck: [], discard: null, hands: [[],[],[],[]], turn: 0 };

        const suits = [{n:'Espadas',s:'⚔️',c:'#1976d2'},{n:'Bastos',s:'🪵',c:'#388e3c'},{n:'Oros',s:'🟡',c:'#fbc02d'},{n:'Copas',s:'🏆',c:'#d32f2f'}];
        const values = [1,2,3,4,5,6,7,10,11,12];

        function setMode(m) {
            gameMode = m;
            document.getElementById('m-ffa').classList.toggle('selected', m === 'ffa');
            document.getElementById('m-2v2').classList.toggle('selected', m === '2v2');
        }

        function hostRoom() {
            isHost = true; myIdx = 0;
            const id = Math.random().toString(36).substring(2, 6).toUpperCase();
            peer = new Peer(id);
            peer.on('open', code => {
                showWaiting(code);
            });
            peer.on('connection', conn => {
                if(connections.length < 3) {
                    connections.push(conn);
                    setupConn(conn);
                    updateCount();
                }
            });
        }

        function joinRoom() {
            const id = document.getElementById('join-id').value.toUpperCase();
            peer = new Peer();
            peer.on('open', () => {
                const conn = peer.connect(id);
                setupConn(conn);
                showWaiting(id);
            });
        }

        function setupConn(c) {
            c.on('open', () => {
                if(!isHost) document.getElementById('count').innerText = "Conectado. Esperando al Host...";
            });
            c.on('data', data => {
                if(data.type === 'WELCOME') myIdx = data.idx;
                if(data.type === 'SYNC') {
                    state = data.state; score = data.score; teamScore = data.teamScore; gameMode = data.mode;
                    if(data.msg) notify(data.msg);
                    render();
                }
            });
        }

        function updateCount() {
            const n = connections.length + 1;
            document.getElementById('count').innerText = `Conectados: ${n} / 4`;
            if(n >= 2) document.getElementById('btn-start').style.display = 'block';
        }

        function showWaiting(c) {
            document.getElementById('setup').style.display = 'none';
            document.getElementById('waiting').style.display = 'block';
            document.getElementById('room-code').innerText = c;
        }

        function startGame() {
            // Asignar indices a cada conexión
            connections.forEach((c, i) => c.send({ type: 'WELCOME', idx: i + 1 }));
            
            state.deck = [];
            suits.forEach(s => values.forEach(v => state.deck.push({suit:s, value:v})));
            state.deck.sort(() => Math.random() - 0.5);
            
            state.hands = [[],[],[],[]];
            const numPlayers = connections.length + 1;
            for(let i=0; i<numPlayers; i++) {
                for(let j=0; j<3; j++) state.hands[i].push(state.deck.pop());
            }
            state.discard = state.deck.pop();
            state.turn = 0;
            sync();
            render();
        }

        function render() {
            document.getElementById('lobby').classList.remove('active');
            document.getElementById('game-ui').style.display = 'flex';
            
            const turnTxt = state.turn === myIdx ? "TU TURNO" : `TURNO P${state.turn + 1}`;
            document.getElementById('turn-label').innerText = turnTxt;

            // Actualizar Nombres/Equipos
            for(let i=0; i<4; i++) {
                const label = document.getElementById(`label-${i}`);
                if(gameMode === '2v2') {
                    label.innerText = (i % 2 === 0) ? `EQUIPO A (P${i+1})` : `EQUIPO B (P${i+1})`;
                } else {
                    label.innerText = `JUGADOR ${i+1}`;
                }
                label.style.borderColor = (state.turn === i) ? 'var(--gold)' : '#555';
            }

            document.getElementById('discard-pile').innerHTML = createCardHTML(state.discard);

            const handDiv = document.getElementById('player-hand');
            handDiv.innerHTML = '';
            const myHand = state.hands[myIdx];
            const overlap = Math.min(70, (window.innerWidth * 0.8) / myHand.length);

            myHand.forEach((card, i) => {
                const c = document.createElement('div');
                c.className = 'card-obj';
                c.style.color = card.suit.c;
                c.style.left = `calc(50% - 37px + ${(i - (myHand.length-1)/2) * overlap}px)`;
                c.style.zIndex = i;
                c.innerHTML = `<b>${card.value}</b><div style="font-size:1.8rem;text-align:center">${card.suit.s}</div><b style="align-self:flex-end;transform:rotate(180deg)">${card.value}</b>`;
                c.onclick = () => playCard(i);
                handDiv.appendChild(c);
            });
        }

        function playCard(i) {
            if(state.turn !== myIdx) return;
            const card = state.hands[myIdx][i];
            if(card.suit.n === state.discard.suit.n || card.value === state.discard.value) {
                state.discard = card;
                state.hands[myIdx].splice(i, 1);
                
                if(state.hands[myIdx].length === 0) {
                    let msg = "";
                    if(gameMode === '2v2') {
                        const team = myIdx % 2;
                        teamScore[team]++;
                        msg = `¡GANÓ EQUIPO ${team === 0 ? 'A' : 'B'}!`;
                    } else {
                        score[myIdx]++;
                        msg = `¡GANÓ P${myIdx+1}!`;
                    }
                    sync(msg);
                    setTimeout(startGame, 3000);
                } else {
                    state.turn = (state.turn + 1) % (connections.length + 1);
                    sync();
                }
            }
        }

        function drawCard() {
            if(state.turn !== myIdx) return;
            if(state.deck.length > 0) {
                state.hands[myIdx].push(state.deck.pop());
                state.turn = (state.turn + 1) % (connections.length + 1);
                sync();
            }
        }

        function sync(msg = null) {
            const data = { type: 'SYNC', state, score, teamScore, mode: gameMode, msg };
            if(isHost) {
                connections.forEach(c => c.send(data));
                render();
            } else {
                conn.send(data); // El invitado le manda al host para que el host rebote a todos (lógica simplificada)
            }
        }

        function notify(t) {
            const m = document.getElementById('msg-pop');
            m.innerText = t; m.classList.remove('anim');
            void m.offsetWidth; m.classList.add('anim');
        }

        function createCardHTML(c) {
            return `<div class="card-obj" style="position:static; color:${c.suit.c}"><b>${c.value}</b><div style="font-size:1.8rem;text-align:center">${c.suit.s}</div><b style="align-self:flex-end;transform:rotate(180deg)">${c.value}</b></div>`;
        }
    </script>
</body>
</html>
